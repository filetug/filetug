version: 2

project_name: filetug

before:
  hooks:
    - go mod tidy

builds:
  - id: filetug-unix
    main: .
    binary: filetug
    env: [ CGO_ENABLED=0 ]
    goos: [ linux, darwin ]
    goarch: [ amd64, arm64 ]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

  - id: filetug-windows
    main: .
    binary: filetug
    env: [ CGO_ENABLED=0 ]
    goos: [ windows ]
    goarch: [ amd64 ]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: tarball
    formats: [ tar.gz ]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    ids: [ filetug-unix ]
    files:
      - README.md
      - LICENSE*

  - id: zip
    formats: [ zip ]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    ids: [ filetug-windows ]

checksum:
  name_template: checksums.txt

release:
  github:
    owner: filetug
    name: filetug

# Homebrew cask (ecosystem standard; `brews:` is deprecated — see
# strongo/cicd README "Packaging conventions"). GoReleaser auto-installs the
# `filetug` binary from the archive, so the old `bin.install "filetug"` and the
# `--version` smoke tests are no longer needed (casks have no install/test
# hook). The `ft` shortcut the old formula created is preserved via custom_block
# below (raw cask DSL) — a second binary stanza symlinks filetug -> ft.
homebrew_casks:
  - name: filetug
    ids:
      - tarball

    description: "FileTug – modern CLI file browser/picker with neat UI"
    homepage: https://github.com/filetug/filetug
    license: MIT

    repository:
      owner: filetug
      name: homebrew-filetug
      # Forwarded by the shared strongo/cicd release.yml (mapped from the repo's
      # HOMEBREW_FILETUG_GITHUB_TOKEN secret).
      token: "{{ .Env.GORELEASER_GITHUB_TOKEN }}"

    custom_block: |
      binary "filetug", target: "ft"